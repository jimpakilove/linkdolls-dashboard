                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            ctx.globalAlpha = 1;
        }

        function applyFilters() {
            const rankBasis = document.getElementById('rankBasis').value;
            const highlight = document.getElementById('highlightFilter').value;
            const trend = document.getElementById('trendFilter').value;
            const weekVal = document.getElementById('weekSelector').value;
            selectedWeekIdx = weekVal === 'all' ? -1 : parseInt(weekVal);
            // selectedCategory is set by tab click

            const pool = getProductPool();

            filteredData = pool.filter(item => {
                if (selectedWeekIdx >= 0 && item.weeklyViews[selectedWeekIdx] === 0) return false;
                if (highlight !== 'all') {
                    if (highlight === 'streak2' && item.streak < 2) return false;
                    if (highlight === 'burst' && item.wow <= 50) return false;
                    if (highlight === 'conversion' && !item.tags.includes('转化待优化')) return false;
                    if (highlight === 'warning' && !item.tags.includes('连跌预警')) return false;
                }
                if (trend !== 'all' && item.trend !== trend) return false;
                return true;
            });

            const sortMetric = document.getElementById('sortMetric').value;
            const wi = selectedWeekIdx;
            filteredData.sort((a, b) => {
                // 选了某周时，优先用当周数据排序
                if (wi >= 0) {
                    switch (sortMetric) {
                        case 'default':
                        case 'totalViews':  return (b.weeklyViews[wi]||0) - (a.weeklyViews[wi]||0);
                        case 'revenue':     return (b.weeklyRevenue[wi]||0) - (a.weeklyRevenue[wi]||0);
                        case 'carts':       return (b.weeklyCarts[wi]||0) - (a.weeklyCarts[wi]||0);
                        case 'cartRate': {
                            const bv = b.weeklyViews[wi]||0, av = a.weeklyViews[wi]||0;
                            return (bv > 0 ? (b.weeklyCarts[wi]||0)/bv : 0) - (av > 0 ? (a.weeklyCarts[wi]||0)/av : 0);
                        }
                        case 'checkouts':   return (b.weeklyCheckouts[wi]||0) - (a.weeklyCheckouts[wi]||0);
                        case 'bounceRate':  return (a.weeklyBounce[wi]||0) - (b.weeklyBounce[wi]||0);
                        case 'wow':         return (b.wow||0) - (a.wow||0);
                        default: return 0;
                    }
                }
                // 全周汇总时，用总量字段
                switch (sortMetric) {
                    case 'default':
                    case 'totalViews':  return b.totalViews - a.totalViews;
                    case 'revenue':     return (b.revenue||0) - (a.revenue||0);
                    case 'carts':       return (b.carts||0) - (a.carts||0);
                    case 'cartRate':    return (b.totalViews > 0 ? b.carts/b.totalViews : 0) - (a.totalViews > 0 ? a.carts/a.totalViews : 0);
                    case 'checkouts':   return (b.checkouts||0) - (a.checkouts||0);
                    case 'bounceRate':  return (a.bounceRate||0) - (b.bounceRate||0);
                    case 'wow':         return (b.wow||0) - (a.wow||0);
                    default: return 0;
                }
            });

            updateTableHeader();
            updateSummaryCards();
            renderTable();
        }

        function updateSummaryCards() {
            const w = selectedWeekIdx;
            const sm = data.summary;
            const pool = getProductPool();
            const catLabel = selectedCategory === 'all' ? 'Top 300' :
                selectedCategory.toUpperCase() + ' Top ' + pool.length;
            let poolV, allv, poolR, allr, label;

            if (w === -1) {
                poolV = pool.reduce((s,p) => s + p.totalViews, 0);
                allv = sm.allWeeklyViews.reduce((a,b)=>a+b,0);
                poolR = pool.reduce((s,p) => s + (p.revenue||0), 0);
                allr = sm.allWeeklyRevenue.reduce((a,b)=>a+b,0);
                label = '7 周汇总';
            } else {
                poolV = pool.reduce((s,p) => s + (p.weeklyViews[w]||0), 0);
                allv = sm.allWeeklyViews[w];
                poolR = pool.reduce((s,p) => s + (p.weeklyRevenue[w]||0), 0);
                allr = sm.allWeeklyRevenue[w];
                label = data.weeks[w];
            }

            const vPct = allv > 0 ? (poolV / allv * 100) : 0;
            const rPct = allr > 0 ? (poolR / allr * 100) : 0;

            document.getElementById('sc-views-pool-label').textContent = catLabel;
            document.getElementById('sc-rev-pool-label').textContent = catLabel;
            document.getElementById('sc-views-label').textContent = '浏览量 (' + label + ')';
            document.getElementById('sc-top50-views').textContent = poolV.toLocaleString();
            document.getElementById('sc-all-views').textContent = allv.toLocaleString();
            document.getElementById('sc-views-bar').style.width = vPct.toFixed(1) + '%';
            document.getElementById('sc-views-pct').textContent = catLabel + ' 占比 ' + vPct.toFixed(1) + '%';

            document.getElementById('sc-rev-label').textContent = '收入 (' + label + ')';
            document.getElementById('sc-top50-rev').textContent = '$' + poolR.toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('sc-all-rev').textContent = '$' + allr.toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('sc-rev-bar').style.width = rPct.toFixed(1) + '%';
            document.getElementById('sc-rev-pct').textContent = catLabel + ' 占比 ' + rPct.toFixed(1) + '%';
        }

        function updateTableHeader() {
            const w = selectedWeekIdx;
            const thead = document.getElementById('tableHead');
            const title = document.getElementById('tableCardTitle');
            const catInfo = selectedCategory !== 'all' ? data.categories[selectedCategory] : null;
            const catTitle = catInfo ? `${selectedCategory.toUpperCase()} · ${catInfo.name} Top ${Math.min(catInfo.total, 300)}` : 'Top 300 产品排行';
            if (w === -1) {
                title.textContent = catTitle;
                thead.innerHTML = `
                    <th>排名</th><th>变化</th><th>产品</th><th>趋势</th>
                    <th>7 周走势</th><th>总浏览</th><th>W16</th><th>W15</th>
                    <th>周环比</th><th>活跃用户</th><th>跳出率</th>
                    <th>加购</th><th>加购率</th><th>结账</th><th>转化率</th><th>收入</th><th>组内排名</th><th>标签</th>`;
            } else {
                const wk = data.weeks[w];
                const prevWk = w > 0 ? data.weeks[w-1] : '—';
                title.textContent = catInfo ? `${selectedCategory.toUpperCase()} · ${catInfo.name} — ${wk} 周报` : `${wk} 周报 · 按浏览量排名`;
                thead.innerHTML = `
                    <th>${wk}排名</th><th>vs${prevWk}</th><th>产品</th><th>趋势</th>
                    <th>7 周走势</th><th>${wk}浏览</th><th>${wk}用户</th><th>${wk}跳出</th>
                    <th>环比</th><th>${wk}加购</th><th>加购率</th><th>${wk}结账</th><th>转化率</th><th>${wk}收入</th>
                    <th>总浏览</th><th>组内排名</th><th>标签</th><th></th>`;
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            const w = selectedWeekIdx;

            filteredData.forEach((item, idx) => {
                const row = document.createElement('tr');
                const prefixClass = getPrefixClass(item.firstChar);
                const prefixColor = prefixColors[prefixClass] || '#999';
                const trendIcon = trendIcons[item.trend] || '➡️';
                const tagsHtml = item.tags.map(tag => `<span class="tag-badge tag-${tag}">${tag}</span>`).join('');

                // Highlight selected week in sparkline
                const sparkHighlight = w >= 0 ? w : -1;

                if (w === -1) {
                    // === SUMMARY MODE (all weeks) ===
                    const displayRank = selectedCategory === 'all' ? item.rank : item.catRank;
                    const deltaClass = item.rankDelta > 0 ? 'up' : item.rankDelta < 0 ? 'down' : item.ranks && item.ranks[item.ranks.length - 2] === null ? 'new' : 'stable';
                    const deltaText = item.rankDelta > 0 ? `↑${item.rankDelta}` : item.rankDelta < 0 ? `↓${Math.abs(item.rankDelta)}` : item.ranks && item.ranks[item.ranks.length - 2] === null ? '新' : '—';
                    const wowClass = item.wow > 0 ? 'wow-positive' : 'wow-negative';

                    row.innerHTML = `
                        <td class="rank-cell ${displayRank <= 3 ? 'rank-top3' : displayRank <= 10 ? 'rank-top10' : ''}">${displayRank}</td>
                        <td><span class="rank-delta ${deltaClass}">${deltaText}</span></td>
                        <td><div class="handle-cell"><span class="prefix-badge prefix-${prefixClass}" style="background:${prefixColor}">${item.firstChar}</span><span class="handle-text" title="${item.name}">${item.name}</span>${item.streak >= 2 ? `<span class="streak-badge">${item.streak}w连升</span>` : ''}</div></td>
                        <td>${trendIcon} ${trendLabels[item.trend]}</td>
                        <td><canvas class="sparkline-canvas" data-values='${JSON.stringify(item.weeklyViews)}' data-prefix='${item.firstChar}' data-hl='${sparkHighlight}'></canvas></td>
                        <td>${item.totalViews}</td>
                        <td>${item.weeklyViews[6]}</td>
                        <td>${item.weeklyViews[5]}</td>
                        <td><span class="wow-value ${wowClass}">${item.wow > 0 ? '+' : ''}${item.wow.toFixed(1)}%</span></td>
                        <td>${item.users}</td>
                        <td>${item.bounceRate.toFixed(1)}%</td>
                        <td>${item.carts}</td>
                        <td>${item.totalViews > 0 ? (item.carts / item.totalViews * 100).toFixed(2) + '%' : '—'}</td>
                        <td>${item.checkouts}</td>
                        <td>${item.totalViews > 0 && item.orderCount > 0 ? (item.orderCount / item.totalViews * 100).toFixed(2) + '%' : '—'}</td>
                        <td>${formatRevenue(item.revenue, item.orderCount)}</td>
                        <td>${item.catRank}/${item.prefixTotal}</td>
                        <td>${tagsHtml}</td>`;
                } else {
                    // === SINGLE WEEK MODE ===
                    const weekRank = selectedCategory === 'all' ? item.ranks[w] : item.catRanks[w];
                    const prevRank = w > 0 ? (selectedCategory === 'all' ? item.ranks[w-1] : item.catRanks[w-1]) : null;
                    const displayRank = weekRank != null ? weekRank : '—';
                    let deltaClass = 'stable', deltaText = '—';
                    if (weekRank != null && prevRank != null) {
                        const d = prevRank - weekRank; // positive = improved
                        if (d > 0) { deltaClass = 'up'; deltaText = `↑${d}`; }
                        else if (d < 0) { deltaClass = 'down'; deltaText = `↓${Math.abs(d)}`; }
                    } else if (weekRank != null && prevRank == null) {
                        deltaClass = 'new'; deltaText = '新';
                    }

                    const wViews = item.weeklyViews[w] || 0;
                    const wUsers = item.weeklyUsers[w] || 0;
                    const wBounce = item.weeklyBounce[w] != null ? item.weeklyBounce[w].toFixed(1) + '%' : '—';
                    const wCarts = item.weeklyCarts[w] || 0;
                    const wCheckouts = item.weeklyCheckouts[w] || 0;
                    const wRevenue = item.weeklyRevenue[w] || 0;

                    // WoW for this specific week
                    let wow = '—', wowClass = '';
                    if (w > 0 && item.weeklyViews[w-1] > 0) {
                        const pct = ((item.weeklyViews[w] - item.weeklyViews[w-1]) / item.weeklyViews[w-1] * 100).toFixed(1);
                        wow = (pct > 0 ? '+' : '') + pct + '%';
                        wowClass = pct >= 0 ? 'wow-positive' : 'wow-negative';
                    }

                    const rankTop = idx + 1;

                    row.innerHTML = `
                        <td class="rank-cell ${rankTop <= 3 ? 'rank-top3' : rankTop <= 10 ? 'rank-top10' : ''}">${displayRank}</td>
                        <td><span class="rank-delta ${deltaClass}">${deltaText}</span></td>
                        <td><div class="handle-cell"><span class="prefix-badge prefix-${prefixClass}" style="background:${prefixColor}">${item.firstChar}</span><span class="handle-text" title="${item.name}">${item.name}</span>${item.streak >= 2 ? `<span class="streak-badge">${item.streak}w连升</span>` : ''}</div></td>
                        <td>${trendIcon} ${trendLabels[item.trend]}</td>
                        <td><canvas class="sparkline-canvas" data-values='${JSON.stringify(item.weeklyViews)}' data-prefix='${item.firstChar}' data-hl='${sparkHighlight}'></canvas></td>
                        <td style="font-weight:700">${wViews}</td>
                        <td>${wUsers}</td>
                        <td>${wBounce}</td>
                        <td><span class="wow-value ${wowClass}">${wow}</span></td>
                        <td>${wCarts}</td>
                        <td>${wViews > 0 ? (wCarts / wViews * 100).toFixed(2) + '%' : '—'}</td>
                        <td>${wCheckouts}</td>
                        <td>${wViews > 0 && (item.weeklyOrderCount && item.weeklyOrderCount[w] > 0) ? (item.weeklyOrderCount[w] / wViews * 100).toFixed(2) + '%' : '—'}</td>
                        <td>${formatRevenue(wRevenue)}</td>
                        <td style="color:#999">${item.totalViews}</td>
                        <td>${item.catRank}/${item.prefixTotal}</td>
                        <td>${tagsHtml}</td>
                        <td></td>`;
                }

                tbody.appendChild(row);
            });

            document.querySelectorAll('canvas.sparkline-canvas').forEach(canvas => {
                const values = JSON.parse(canvas.getAttribute('data-values'));
                const prefix = canvas.getAttribute('data-prefix');
                const hl = parseInt(canvas.getAttribute('data-hl'));
                createSparkline(canvas, values, prefix, hl);
            });
        }

        document.getElementById('rankBasis').addEventListener('change', applyFilters);
        document.getElementById('highlightFilter').addEventListener('change', applyFilters);
        document.getElementById('trendFilter').addEventListener('change', applyFilters);
        document.getElementById('weekSelector').addEventListener('change', applyFilters);
        document.getElementById('sortMetric').addEventListener('change', applyFilters);

        applyFilters();
    </script>
</body>
</html>
