<div class="container">
    <div class="header">
        <div class="header-title">产品类别横向对比</div>
        <div class="header-sub">W10–W16 · 按产品首字母分类对比浏览、收入、转化等核心指标</div>
    </div>

    <div class="filters">
        <div>
            <div class="filter-label">查看周</div>
            <select class="filter-select" id="weekSelector" style="font-weight:700;color:#2563eb;">
                <option value="all">全部 7 周汇总</option>
            </select>
        </div>
        <div>
            <div class="filter-label">排序</div>
            <select class="filter-select" id="sortSelector">
                <option value="views">按浏览量</option>
                <option value="revenue">按收入</option>
                <option value="cartRate">按加购率</option>
                <option value="convRate">按转化率</option>
                <option value="avgViews">按人均浏览</option>
                <option value="count">按产品数</option>
            </select>
        </div>
    </div>

    <div class="card">
        <div class="card-title" id="tableTitle">类别横向对比 · 7 周汇总</div>
        <div class="table-scroll">
            <table>
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const data = window.__CAT_DATA__;

    const catColors = {
        'f':'#dc2626','a':'#ea580c','t':'#d97706','h':'#0891b2',
        'p':'#7c3aed','v':'#65a30d','l':'#16a34a','b':'#ec4899',
        'm':'#059669','d':'#0284c7','other':'#6b7280'
    };

    let selectedWeek = -1;

    // Init week selector
    (function(){
        const sel = document.getElementById('weekSelector');
        data.weeks.forEach((w,i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = w + (i === data.weeks.length-1 ? ' (最新)' : '');
            sel.appendChild(opt);
        });
    })();

    function formatMoney(v) { return '$' + v.toLocaleString('en-US',{maximumFractionDigits:0}); }
    function formatEngTime(s) { return Math.floor(s/60)+'m '+Math.floor(s%60)+'s'; }

    function createSparkline(canvas, values, color) {
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        if (!values || values.length === 0) return;
        const maxV = Math.max(...values, 1);
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(0,0,W,H);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        values.forEach((v,i) => {
            const x = i/(values.length-1) * (W-8) + 4;
            const y = H - 4 - (v/maxV)*(H-8);
            i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.stroke();
        // Highlight last point
        const lastX = (values.length-1)/(values.length-1)*(W-8)+4;
        const lastY = H-4-(values[values.length-1]/maxV)*(H-8);
        ctx.beginPath();
        ctx.arc(lastX,lastY,3,0,Math.PI*2);
        ctx.fillStyle = color;
        ctx.globalAlpha = 1;
        ctx.fill();
    }

    function render() {
        const w = selectedWeek;
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        const title = document.getElementById('tableTitle');

        const isAll = w === -1;
        const label = isAll ? '7 周汇总' : data.weeks[w];
        title.textContent = '类别横向对比 · ' + label;

        thead.innerHTML = `
            <th>类别</th><th>名称</th><th>产品数</th>
            <th>浏览量</th><th>浏览占比</th><th>7周走势</th>
            <th>活跃用户</th><th>人均浏览</th><th>环比</th>
            <th>加购数</th><th>加购率</th>
            <th>订单数</th><th>转化率</th>
            <th>收入</th><th>收入占比</th>
            <th>跳出率</th><th>互动时长</th>`;

        // Compute metrics
        let rows = data.categories.map(c => {
            let views, users, carts, orders, rev, bounce, eng, wow;
            if (isAll) {
                views = c.totalViews;
                users = c.totalUsers;
                carts = c.totalCarts;
                orders = c.totalOrders;
                rev = c.totalRevenue;
                bounce = c.avgBounce;
                eng = c.avgEngTime;
                const v6 = c.weeklyViews[6], v5 = c.weeklyViews[5];
                wow = v5 > 0 ? ((v6-v5)/v5*100).toFixed(1) : '—';
            } else {
                views = c.weeklyViews[w];
                users = c.weeklyUsers[w];
                carts = c.weeklyCarts[w];
                orders = c.weeklyOrders[w];
                rev = c.weeklyRevenue[w];
                bounce = c.weeklyBounce[w];
                eng = c.weeklyEngTime[w];
                if (w > 0 && c.weeklyViews[w-1] > 0) {
                    wow = ((views - c.weeklyViews[w-1])/c.weeklyViews[w-1]*100).toFixed(1);
                } else { wow = '—'; }
            }
            const cartRate = views > 0 ? (carts/views*100).toFixed(2) : '0';
            const convRate = views > 0 ? (orders/views*100).toFixed(3) : '0';
            const avgV = c.productCount > 0 ? (views/c.productCount).toFixed(1) : '0';
            return { ...c, views, users, carts, orders, rev, bounce, eng, wow, cartRate, convRate, avgV };
        });

        // Sort
        const sortBy = document.getElementById('sortSelector').value;
        const sortFn = {
            'views': (a,b) => b.views - a.views,
            'revenue': (a,b) => b.rev - a.rev,
            'cartRate': (a,b) => parseFloat(b.cartRate) - parseFloat(a.cartRate),
            'convRate': (a,b) => parseFloat(b.convRate) - parseFloat(a.convRate),
            'avgViews': (a,b) => parseFloat(b.avgV) - parseFloat(a.avgV),
            'count': (a,b) => b.productCount - a.productCount,
        }[sortBy] || ((a,b) => b.views - a.views);
        rows.sort(sortFn);

        // Totals
        const totalViews = rows.reduce((s,r) => s+r.views, 0);
        const totalRev = rows.reduce((s,r) => s+r.rev, 0);

        tbody.innerHTML = '';
        rows.forEach(r => {
            const viewsPct = totalViews > 0 ? (r.views/totalViews*100).toFixed(1) : '0';
            const revPct = totalRev > 0 ? (r.rev/totalRev*100).toFixed(1) : '0';
            const color = catColors[r.key] || '#6b7280';
            const wowClass = r.wow !== '—' ? (parseFloat(r.wow) >= 0 ? 'wow-positive' : 'wow-negative') : '';
            const wowText = r.wow !== '—' ? (parseFloat(r.wow) > 0 ? '+'+r.wow+'%' : r.wow+'%') : '—';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="cat-badge" style="background:${color}">${r.key === 'other' ? '?' : r.key.toUpperCase()}</span></td>
                <td class="cat-name">${r.name}</td>
                <td>${r.productCount.toLocaleString()}</td>
                <td style="font-weight:700">${r.views.toLocaleString()}</td>
                <td class="bar-cell">
                    <span>${viewsPct}%</span>
                    <div class="bar-bg"><div class="bar-fill" style="width:${viewsPct}%;background:${color};"></div></div>
                </td>
                <td><canvas class="sparkline-canvas" data-values='${JSON.stringify(r.weeklyViews)}' data-color='${color}'></canvas></td>
                <td>${r.users.toLocaleString()}</td>
                <td>${r.avgV}</td>
                <td><span class="${wowClass}">${wowText}</span></td>
                <td>${r.carts}</td>
                <td>${r.cartRate}%</td>
                <td>${r.orders}</td>
                <td>${r.convRate}%</td>
                <td style="font-weight:600">${formatMoney(r.rev)}</td>
                <td class="bar-cell">
                    <span>${revPct}%</span>
                    <div class="bar-bg"><div class="bar-fill" style="width:${revPct}%;background:#059669;"></div></div>
                </td>
                <td>${r.bounce.toFixed(1)}%</td>
                <td>${formatEngTime(r.eng)}</td>`;
            tbody.appendChild(tr);
        });

        // Totals row
        const totalCarts = rows.reduce((s,r) => s+r.carts, 0);
        const totalOrders = rows.reduce((s,r) => s+r.orders, 0);
        const totalUsers = rows.reduce((s,r) => s+r.users, 0);
        const totalCartRate = totalViews > 0 ? (totalCarts/totalViews*100).toFixed(2) : '0';
        const totalConvRate = totalViews > 0 ? (totalOrders/totalViews*100).toFixed(3) : '0';
        const totalCount = rows.reduce((s,r) => s+r.productCount, 0);

        const totTr = document.createElement('tr');
        totTr.className = 'totals-row';
        totTr.innerHTML = `
            <td></td><td class="cat-name">合计</td>
            <td>${totalCount.toLocaleString()}</td>
            <td>${totalViews.toLocaleString()}</td><td>100%</td><td></td>
            <td>${totalUsers.toLocaleString()}</td><td>${(totalViews/totalCount).toFixed(1)}</td><td></td>
            <td>${totalCarts}</td><td>${totalCartRate}%</td>
            <td>${totalOrders}</td><td>${totalConvRate}%</td>
            <td style="font-weight:700">${formatMoney(totalRev)}</td><td>100%</td>
            <td></td><td></td>`;
        tbody.appendChild(totTr);

        // Draw sparklines
        document.querySelectorAll('canvas.sparkline-canvas').forEach(canvas => {
            const vals = JSON.parse(canvas.getAttribute('data-values'));
            const col = canvas.getAttribute('data-color');
            createSparkline(canvas, vals, col);
        });
    }

    document.getElementById('weekSelector').addEventListener('change', function() {
        selectedWeek = this.value === 'all' ? -1 : parseInt(this.value);
        render();
    });
    document.getElementById('sortSelector').addEventListener('change', render);

    render();
</script>
</body>
</html>
